name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  BINARY_NAME: imaprelay
  VERSION: ${{ github.event.release.tag_name }}

jobs:
  build-linux-amd64:
    name: Build Linux AMD64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/${BINARY_NAME}-linux-amd64" \
            .

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-amd64
          path: dist/imaprelay-linux-amd64
          if-no-files-found: error
          retention-days: 1

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/${BINARY_NAME}-linux-arm64" \
            .

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-arm64
          path: dist/imaprelay-linux-arm64
          if-no-files-found: error
          retention-days: 1

  build-windows-amd64:
    name: Build Windows AMD64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/${BINARY_NAME}-windows-amd64.exe" \
            .

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-amd64
          path: dist/imaprelay-windows-amd64.exe
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - build-linux-amd64
      - build-linux-arm64
      - build-windows-amd64

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum imaprelay-* > checksums.txt

      - name: Show release files
        run: ls -lah dist

      - name: Upload files to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${VERSION}" \
            dist/imaprelay-linux-amd64 \
            dist/imaprelay-linux-arm64 \
            dist/imaprelay-windows-amd64.exe \
            dist/checksums.txt \
            --clobber
